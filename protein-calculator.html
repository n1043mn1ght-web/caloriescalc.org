<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Protein Calculator — How Much Protein Do I Need Per Day?</title>
<meta name="description" content="Free protein calculator. Find your exact daily protein intake in grams for fat loss, muscle gain, or maintenance — with per-meal targets and high-protein food sources. No sign-up required."/>
<link rel="canonical" href="https://tdee-calculator-dad.pages.dev/protein-calculator.html"/>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:40px 20px;
}

.container{
  max-width:700px;
  margin:0 auto;
  background:#fff;
  padding:30px;
  border-radius:16px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
  margin-top:0;
  line-height:1.2;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

@media(max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

input,
select,
button{
  font-size:16px;
}

input,
select{
  padding:12px;
  border:1px solid #ccc;
  border-radius:10px;
}

button{
  margin-top:20px;
  width:100%;
  border:none;
  background:#0f766e;
  color:white;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#0d5c56;
}

.result{
  margin-top:30px;
  display:none;
  padding:24px;
  border-radius:16px;
  background:#0f766e;
  color:white;
  text-align:center;
}

.result-number{
  font-size:64px;
  font-weight:bold;
}

.small{
  opacity:.8;
  margin-top:10px;
}

.cards{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

@media(max-width:600px){
  .cards{
    grid-template-columns:1fr;
  }
}

.card{
  background:#f0f0f0;
  border-radius:12px;
  padding:16px;
  text-align:center;
  color:#111;
}

.card strong{
  display:block;
  font-size:28px;
  margin-bottom:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>Protein Calculator</h1>

<p>
Calculate your ideal daily protein intake for muscle gain,
fat loss, or maintenance.
</p>

<div style="margin-bottom:20px">
  <button type="button" id="btn-imp">Imperial (lbs)</button>
  <button type="button" id="btn-met">Metric (kg)</button>
</div>

<div class="grid">

  <div class="field">
    <label>Body Weight</label>
    <input type="number" id="weight" value="175"/>
  </div>

  <div class="field">
    <label>Body Fat % (optional)</label>
    <input type="number" id="bf" placeholder="e.g. 18"/>
  </div>

  <div class="field">
    <label>Activity</label>
    <select id="activity">
      <option value="sedentary">Sedentary</option>
      <option value="light">Lightly active</option>
      <option value="moderate" selected>Moderately active</option>
      <option value="very">Very active</option>
      <option value="athlete">Athlete</option>
    </select>
  </div>

  <div class="field">
    <label>Goal</label>
    <select id="goal">
      <option value="loss">Fat loss</option>
      <option value="maintain" selected>Maintenance</option>
      <option value="gain">Muscle gain</option>
    </select>
  </div>

</div>

<button id="calcbtn">
  Calculate Protein
</button>

<div class="result" id="results">

  <div class="result-number" id="r-prot">
    0
  </div>

  <div>
    grams of protein per day
  </div>

  <div class="small" id="r-sub">
    —
  </div>

  <div class="cards" id="goals-grid"></div>

</div>

</div>

<script>
let unit = 'imperial';

const MULTS = {
  loss: {
    sedentary: 1.8,
    light: 2.0,
    moderate: 2.2,
    very: 2.4,
    athlete: 2.4
  },

  maintain: {
    sedentary: 1.4,
    light: 1.6,
    moderate: 1.8,
    very: 2.0,
    athlete: 2.2
  },

  gain: {
    sedentary: 1.6,
    light: 1.8,
    moderate: 2.0,
    very: 2.2,
    athlete: 2.4
  }
};

const GOAL_LABELS = {
  loss: 'Fat loss',
  maintain: 'Maintenance',
  gain: 'Muscle gain'
};

const btnImp = document.getElementById('btn-imp');
const btnMet = document.getElementById('btn-met');

btnImp.addEventListener('click', () => {
  setUnit('imperial');
});

btnMet.addEventListener('click', () => {
  setUnit('metric');
});

function setUnit(u){

  if(u === unit) return;

  const weightInput = document.getElementById('weight');

  let w = parseFloat(weightInput.value);

  if(!isNaN(w) && w > 0){

    if(u === 'metric' && unit === 'imperial'){
      weightInput.value = Math.round(w / 2.205);
    }

    else if(u === 'imperial' && unit === 'metric'){
      weightInput.value = Math.round(w * 2.205);
    }

  }

  unit = u;

  btnImp.style.opacity = u === 'imperial' ? '1' : '.6';
  btnMet.style.opacity = u === 'metric' ? '1' : '.6';
}

document.getElementById('calcbtn')
.addEventListener('click', calculate);

function calculate(){

  const btn = document.getElementById('calcbtn');

  btn.disabled = true;
  btn.textContent = 'Calculating...';

  setTimeout(() => {

    try{
      doCalc();
    }

    catch(err){
      console.error(err);
      alert('Calculation error.');
    }

    btn.disabled = false;
    btn.textContent = 'Calculate Protein';

  }, 50);
}

function doCalc(){

  let weight =
    parseFloat(document.getElementById('weight').value);

  const bf =
    parseFloat(document.getElementById('bf').value);

  const act =
    document.getElementById('activity').value;

  const goal =
    document.getElementById('goal').value;

  if(isNaN(weight) || weight <= 0){
    alert('Please enter valid body weight.');
    return;
  }

  let wkg =
    unit === 'imperial'
      ? weight / 2.205
      : weight;

  const usesBF =
    !isNaN(bf) &&
    bf > 0 &&
    bf < 70;

  const leanKg =
    usesBF
      ? wkg * (1 - bf / 100)
      : wkg;

  const mult =
    MULTS[goal][act];

  const protein =
    Math.round(leanKg * mult);

  let label;

  if(usesBF){

    label =
      mult.toFixed(1) +
      'g/kg lean mass (' +
      (protein / wkg).toFixed(1) +
      'g/kg total)';

  }

  else{

    label =
      mult.toFixed(1) +
      'g/kg bodyweight';

  }

  document.getElementById('r-prot')
    .textContent = protein;

  document.getElementById('r-sub')
    .textContent =
      GOAL_LABELS[goal] +
      ' · ' +
      label;

  document.getElementById('results')
    .style.display = 'block';

  const goalsGrid =
    document.getElementById('goals-grid');

  goalsGrid.innerHTML =
    ['loss','maintain','gain']
      .map(g => {

        const val =
          Math.round(
            leanKg * MULTS[g][act]
          );

        return `
          <div class="card">
            <strong>${val}g</strong>
            ${GOAL_LABELS[g]}
          </div>
        `;

      })
      .join('');

  setTimeout(() => {

    document.getElementById('results')
      .scrollIntoView({
        behavior:'smooth'
      });

  }, 100);
}

document.addEventListener('keydown', e => {

  if(
    e.key === 'Enter' &&
    ['INPUT','SELECT']
      .includes(document.activeElement.tagName)
  ){
    calculate();
  }

});
</script>

</body>
</html>
